<!doctype html>
<html lang="en">

    <meta name="keywords" content="election, India, voter, EVM, VVPAT, Google AI, Gemini, ElectionVerse" />
    <meta name="author" content="ElectionVerse" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="ElectionVerse AI — Smart Election Guide for India" />
    <meta property="og:description" content="Interactive AI-powered election learning platform for Indian democracy." />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- ✅ Google Fonts — Inter & Outfit for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Google Analytics 4 (GA4) — Usage tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ELECTIONVERSE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-ELECTIONVERSE', {
        page_title: 'ElectionVerse AI',
        send_page_view: true,
        anonymize_ip: true
      });
    </script>

    <!-- ✅ Google Translate API — Multilingual support -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        if (window.google && window.google.translate) {
          new google.translate.TranslateElement(
            {
              pageLanguage: 'en',
              includedLanguages: 'hi,mr,pa,en',
              layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
              autoDisplay: false
            },
            'google-translate-element'
          );
        }
      }
    </script>
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
      defer
    ></script>

    <!-- Accessibility: High-contrast mode support -->
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#00B4DB" />
  </head>

    <div id="aria-announcer" aria-live="polite" aria-atomic="true" class="sr-only"></div>
